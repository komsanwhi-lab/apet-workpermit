<!DOCTYPE html><html lang="th"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Approval</title><style>
:root{--red:#C0392B;--red-light:#FADBD8;--green:#27AE60;--green-light:#D5F5E3;--orange:#E67E22;--orange-light:#FDEBD0;--blue:#2980B9;--blue-light:#D6EAF8;--purple:#7C5CBF;--purple-light:#EAD7FF;--gray-50:#F8F9FA;--gray-100:#F1F3F4;--gray-200:#E8EAED;--gray-300:#DADCE0;--gray-500:#9AA0A6;--gray-700:#5F6368;--gray-900:#202124}
*{box-sizing:border-box} body{font-family:Arial,sans-serif;background:#F0F2F5;color:var(--gray-900);margin:0}
.header{background:#1A252F;color:#fff;padding:14px 20px;display:flex;gap:14px;align-items:center}
.logo{background:var(--red);padding:4px 10px;border-radius:6px;font-weight:700}
.wrap{max-width:1100px;margin:0 auto;padding:24px 16px 48px}
.card{background:#fff;border-radius:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:16px;overflow:hidden}
.card h2{font-size:15px;margin:0;padding:14px 18px;border-bottom:1px solid var(--gray-200);background:var(--gray-50)}
.card .body{padding:18px}
.grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
label{font-size:13px;font-weight:600;color:var(--gray-700);display:block;margin-bottom:4px}
input,textarea,select{width:100%;padding:10px 12px;border:1.5px solid var(--gray-300);border-radius:8px;font:inherit}
textarea{min-height:80px;resize:vertical}
button,.btn{border:none;border-radius:8px;padding:10px 16px;font:inherit;font-weight:700;cursor:pointer;text-decoration:none;display:inline-block}
.btn-red{background:var(--red);color:#fff}.btn-blue{background:var(--blue);color:#fff}.btn-green{background:var(--green);color:#fff}.btn-purple{background:var(--purple);color:#fff}
.btn-gray{background:#fff;color:var(--gray-700);border:1px solid var(--gray-300)}
.actions{display:flex;gap:8px;flex-wrap:wrap}
.notice{padding:12px 14px;border-radius:10px;background:var(--orange-light);border:1px solid #f6c58a}
.table{width:100%;border-collapse:collapse}.table th,.table td{padding:10px;border-bottom:1px solid var(--gray-200);text-align:left;font-size:13px;vertical-align:top}
.table th{background:var(--gray-50);font-size:12px;text-transform:uppercase;color:var(--gray-700)}
.badge{display:inline-block;padding:4px 10px;border-radius:999px;font-size:12px;font-weight:700}
.badge-pending{background:#FFF3CD;color:#856404}.badge-approved{background:var(--green-light);color:#1E8449}.badge-rejected{background:var(--red-light);color:#96281B}
.badge-blue{background:var(--blue-light);color:#185FA5}.badge-purple{background:var(--purple-light);color:#6c45bf}
.sig{border:1.5px solid var(--gray-300);border-radius:8px;background:#fafafa;overflow:hidden}
canvas{width:100%;height:150px;display:block;touch-action:none;cursor:crosshair}
.sigbar{padding:8px 10px;border-top:1px solid var(--gray-200);background:var(--gray-50);display:flex;justify-content:space-between}
.center{text-align:center}
.hidden{display:none!important}
@media(max-width:800px){.grid,.grid3{grid-template-columns:1fr}}
</style></head><body>
<div class="header"><div class="logo">APET</div><div id="headTitle">ลงชื่ออนุญาต</div><div style="margin-left:auto"><a class="btn btn-gray" href="dashboard.html">กลับ Dashboard</a></div></div>
<div class="wrap">
<div id="loading" class="notice">🔄 กำลังโหลดข้อมูล...</div>
<div id="main-content" class="hidden">
<div class="card"><h2>ข้อมูลใบอนุญาต</h2><div class="body" id="permitInfo"></div></div>
<div class="card"><h2 id="roleTitle">ลงชื่อ</h2><div class="body">
  <div id="lockBox" class="notice hidden"></div>
  <div class="grid"><div><label>ชื่อผู้ลงนาม</label><input id="name"></div><div><label>วันที่</label><input id="date"></div></div>
  <div style="margin-top:14px"><label>หมายเหตุ</label><textarea id="note"></textarea></div>
  <div style="margin-top:14px"><label>ลายเซ็น</label><div class="sig"><canvas id="sig"></canvas><div class="sigbar"><button class="btn btn-gray" onclick="sig.clear()">ล้าง</button><span>เซ็นด้วยเมาส์หรือมือถือ</span></div></div></div>
  <div class="actions" style="margin-top:18px"><button id="saveBtn" class="btn-blue" onclick="save()">บันทึกลายเซ็น</button><button id="btnPrint" class="btn btn-gray hidden" onclick="openPrint()">เปิดหน้า Print</button></div>
</div></div>
<div id="success" class="card hidden"><h2>บันทึกเรียบร้อย</h2><div class="body center"><div id="successText"></div></div></div>
</div></div>
<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGzsisnsQRVypgSwQP6XnjBqteucMgXD-k1cRT3mQEuWCY-XNrWZ49HcNtnEdr0aY3Sw/exec';
function esc(s){return String(s??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}
async function fetchPermit(id){
  const res = await fetch(`${APPS_SCRIPT_URL}?action=get_approval&id=${encodeURIComponent(id)}`, {redirect:'follow', mode:'cors'});
  const text = await res.text();
  return JSON.parse(text);
}
function makeSignature(id){
 const c=document.getElementById(id); if(!c) return null;
 c.width=900; c.height=170; const ctx=c.getContext('2d'); ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
 let d=false,lx=0,ly=0;
 const pos=e=>{const r=c.getBoundingClientRect(),sx=c.width/r.width,sy=c.height/r.height,s=e.touches?e.touches[0]:e;return {x:(s.clientX-r.left)*sx,y:(s.clientY-r.top)*sy}};
 c.addEventListener('mousedown',e=>{d=true;const p=pos(e);lx=p.x;ly=p.y;});
 c.addEventListener('mousemove',e=>{if(!d)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;});
 ['mouseup','mouseleave'].forEach(ev=>c.addEventListener(ev,()=>d=false));
 c.addEventListener('touchstart',e=>{e.preventDefault();d=true;const p=pos(e);lx=p.x;ly=p.y;},{passive:false});
 c.addEventListener('touchmove',e=>{e.preventDefault();if(!d)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
 c.addEventListener('touchend',()=>d=false);
 return {clear(){ctx.clearRect(0,0,c.width,c.height)}, empty(){return !ctx.getImageData(0,0,c.width,c.height).data.some(v=>v!==0)}, data(){return c.toDataURL('image/png')}};
}
function statusBadge(status){
  if(status==='อนุมัติ') return `<span class="badge badge-approved">อนุมัติ</span>`;
  if(status==='ไม่อนุมัติ') return `<span class="badge badge-rejected">ไม่อนุมัติ</span>`;
  if(status==='รอ จป.วิชาชีพ') return `<span class="badge badge-purple">รอ จป.</span>`;
  if(status==='รอ ประธาน คปอ.') return `<span class="badge badge-blue">รอ คปอ.</span>`;
  return `<span class="badge badge-pending">${esc(status||'รอตรวจสอบ')}</span>`;
}
</script>
<script>
let permitData = null, approvalState = {dept:null, inspector:null, chairman:null};
const params = new URLSearchParams(location.search), permitId = params.get('id'), role = params.get('role') || 'dept';
const roleNames = { dept:'แผนกที่ว่าจ้าง', inspector:'จป.วิชาชีพ', chairman:'ประธาน คปอ.' };
document.getElementById('date').value = new Date().toLocaleDateString('th-TH');
document.getElementById('headTitle').textContent = 'ลงชื่อ ' + roleNames[role];
document.getElementById('roleTitle').textContent = 'ขั้นตอนลงชื่อ — ' + roleNames[role];
const sig = makeSignature('sig');
document.addEventListener('DOMContentLoaded', ()=>loadData());
async function loadData(){
  try {
    const json = await fetchPermit(permitId);
    if (json.success) { permitData = json.permit || null; approvalState = json.approval || approvalState; }
    if (!permitData) throw new Error('No permit data');
  } catch(e) {
    permitData = { permit_id: permitId, company_name:'โหลดข้อมูลไม่ได้ — ใช้ข้อมูล Demo', supervisor:'—', work_date:'—', time_start:'08:00', time_end:'17:00', work_area:'—', status:'รอตรวจสอบ' };
  }
  document.getElementById('permitInfo').innerHTML = `<div class="grid3">
    <div><b>Permit ID</b><div>${esc(permitData.permit_id)}</div></div>
    <div><b>บริษัท</b><div>${esc(permitData.company_name)}</div></div>
    <div><b>ผู้ควบคุมงาน</b><div>${esc(permitData.supervisor)}</div></div>
    <div><b>วันที่</b><div>${esc(permitData.work_date)}</div></div>
    <div><b>เวลา</b><div>${esc((permitData.time_start||'-')+' - '+(permitData.time_end||'-'))}</div></div>
    <div><b>พื้นที่</b><div>${esc(permitData.work_area)}</div></div></div>`;
  if (role === 'inspector' && !approvalState.dept) lock('ต้องให้แผนกที่ว่าจ้างลงชื่อก่อน');
  if (role === 'chairman' && (!approvalState.dept || !approvalState.inspector)) lock('ต้องให้แผนกที่ว่าจ้างและ จป.วิชาชีพลงชื่อก่อน');
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('main-content').classList.remove('hidden');
}
function lock(msg){ document.getElementById('lockBox').textContent = msg; document.getElementById('lockBox').classList.remove('hidden'); document.getElementById('saveBtn').disabled = true; }
async function save(){
  const name = document.getElementById('name').value.trim(), date = document.getElementById('date').value.trim(), note = document.getElementById('note').value.trim(), savedAt = new Date().toLocaleString('th-TH');
  if (!name) return alert('กรุณากรอกชื่อ');
  if (sig.empty()) return alert('กรุณาลงลายเซ็น');
  approvalState[role] = { name, date, savedAt, note };
  const allSigned = approvalState.dept && approvalState.inspector && approvalState.chairman;
  const finalStatus = allSigned ? 'อนุมัติ' : (role === 'dept' ? 'รอ จป.วิชาชีพ' : (role === 'inspector' ? 'รอ ประธาน คปอ.' : 'รอตรวจสอบ'));
  try {
    const payload = JSON.stringify({ permitId: permitData.permit_id, role, name, date, note, savedAt, finalStatus, allApprovals: approvalState, signature: sig.data() });
    await fetch(APPS_SCRIPT_URL, { method:'POST', mode:'no-cors', headers:{'Content-Type':'application/json'}, body: payload });
  } catch(e) { console.warn(e); }
  document.getElementById('success').classList.remove('hidden');
  document.getElementById('successText').innerHTML = allSigned ? `<b>${esc(permitData.permit_id)}</b><br>อนุมัติแล้ว — ครบทุกขั้นตอน` : `<b>${esc(permitData.permit_id)}</b><br>${esc(roleNames[role])} ลงชื่อแล้ว`;
  if (allSigned) document.getElementById('btnPrint').classList.remove('hidden');
}
function openPrint(){ window.open('print.html?id=' + encodeURIComponent(permitData.permit_id), '_blank'); }
</script></body></html>
