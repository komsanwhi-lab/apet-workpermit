<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist จป.วิชาชีพ — APET</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--red-light:#FADBD8;--green:#27AE60;--green-light:#D5F5E3;--orange:#E67E22;--orange-light:#FDEBD0;--blue:#2980B9;--blue-light:#D6EAF8;--purple:#7C5CBF;--purple-light:#EAD7FF;--gray-50:#F8F9FA;--gray-100:#F1F3F4;--gray-200:#E8EAED;--gray-300:#DADCE0;--gray-500:#9AA0A6;--gray-700:#5F6368;--gray-900:#202124}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#F0F2F5;color:var(--gray-900);min-height:100vh}
.site-header{background:#7C5CBF;position:sticky;top:0;z-index:100}
.header-inner{max-width:960px;margin:0 auto;padding:13px 20px;display:flex;align-items:center;gap:14px}
.logo{background:rgba(255,255,255,.2);border-radius:6px;padding:4px 10px;font-weight:700;font-size:17px;color:#fff;border:1px solid rgba(255,255,255,.3)}
.htitle{color:#fff;font-size:15px;font-weight:600}
.hsub{color:rgba(255,255,255,.75);font-size:12px;margin-top:1px}
.hright{margin-left:auto}
.btn-hdr{background:rgba(255,255,255,.15);color:#fff;border:1px solid rgba(255,255,255,.3);border-radius:6px;padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;text-decoration:none;display:inline-block}
.page{max-width:960px;margin:0 auto;padding:20px 16px 90px}

/* Phase tabs */
.phase-tabs{display:flex;background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);overflow:hidden;margin-bottom:18px}
.phase-tab{flex:1;padding:12px 6px;text-align:center;font-size:12px;font-weight:500;color:var(--gray-500);cursor:pointer;border-right:1px solid var(--gray-200);transition:all .2s;user-select:none;position:relative}
.phase-tab:last-child{border-right:none}
.phase-tab.active{background:var(--purple-light);color:var(--purple);font-weight:700}
.phase-tab.saved{color:var(--green);font-weight:600}
.phase-tab.saved::after{content:'✓';position:absolute;top:6px;right:8px;font-size:11px;color:var(--green)}
.phase-num{display:block;font-size:20px;font-weight:700;margin-bottom:2px}

/* Banner */
.permit-banner{background:#1A252F;border-radius:10px;padding:14px 18px;margin-bottom:16px}
.bid{font-family:monospace;font-size:15px;font-weight:700;color:#fff}
.bco{font-size:12px;color:rgba(255,255,255,.7);margin-top:3px}
.binfo{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:10px}
.bi{background:rgba(255,255,255,.08);border-radius:6px;padding:7px 10px}
.bil{font-size:9px;color:rgba(255,255,255,.5);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}
.biv{font-size:12px;color:#fff;font-weight:500}

/* OT alert */
.ot-alert{background:var(--orange-light);border:2px solid var(--orange);border-radius:8px;padding:13px 16px;margin-bottom:14px;display:none}
.ot-alert.show{display:block}
.ot-title{font-weight:700;color:var(--orange);margin-bottom:4px;font-size:13px}
.ot-detail{font-size:12px;color:var(--gray-700)}

/* Card */
.card{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.08);margin-bottom:14px;overflow:hidden}
.card-header{border-bottom:1px solid var(--gray-200);padding:12px 18px;display:flex;align-items:center;gap:10px;background:var(--gray-50)}
.card-icon{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.card-title{font-weight:600;font-size:13px}
.card-body{padding:0}

/* Check table */
.cl-table{width:100%;border-collapse:collapse}
.cl-table th{background:var(--gray-50);padding:9px 12px;font-size:10px;font-weight:700;color:var(--gray-700);text-transform:uppercase;letter-spacing:.4px;border-bottom:2px solid var(--gray-200);white-space:nowrap}
.cl-table th:first-child{text-align:left}
.cl-table th:not(:first-child){text-align:center;width:90px}
.cl-table td{padding:8px 12px;border-bottom:1px solid var(--gray-100);font-size:12.5px;vertical-align:middle}
.cl-table td:not(:first-child){text-align:center}
.cl-table tr:last-child td{border-bottom:none}
.cl-table tr:hover td{background:var(--gray-50)}
.rg{display:flex;gap:3px;justify-content:center}
.rb{width:30px;height:26px;border:1.5px solid var(--gray-300);border-radius:4px;background:#fff;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;transition:all .15s}
.rb.ok{border-color:var(--green);color:var(--green)}.rb.ok.active{background:var(--green);color:#fff}
.rb.ng{border-color:var(--red);color:var(--red)}.rb.ng.active{background:var(--red);color:#fff}
.rb.na{border-color:var(--gray-300);color:var(--gray-500)}.rb.na.active{background:var(--gray-300);color:var(--gray-700)}

/* Cond sections */
.cond-section{display:none}.cond-section.show{display:block}

/* Form */
.form-pad{padding:14px 16px}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.form-group{display:flex;flex-direction:column;gap:4px}
.form-label{font-size:12px;font-weight:500;color:var(--gray-700)}
input[type=text],input[type=time],textarea{border:1.5px solid var(--gray-300);border-radius:6px;padding:8px 11px;font-size:13px;font-family:inherit;outline:none;width:100%;transition:border-color .15s;background:#fff}
input:focus,textarea:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,92,191,.1)}
textarea{resize:vertical;min-height:55px}

/* Training */
.train-options{display:flex;gap:10px;margin-top:8px}
.train-btn{flex:1;padding:9px;border:2px solid var(--gray-300);border-radius:8px;text-align:center;cursor:pointer;font-size:12px;font-family:inherit;background:#fff;transition:all .15s}
.train-btn.pass{border-color:var(--green);color:var(--green)}.train-btn.pass.active{background:var(--green);color:#fff}
.train-btn.fail{border-color:var(--red);color:var(--red)}.train-btn.fail.active{background:var(--red);color:#fff}

/* OT decision */
.ot-decision{background:var(--orange-light);border:1.5px solid #FBBF7E;border-radius:8px;padding:14px}
.ot-opt{display:flex;align-items:flex-start;gap:8px;font-size:12px;padding:5px 0;border-bottom:1px solid rgba(0,0,0,.06);cursor:pointer}
.ot-opt:last-child{border-bottom:none}
.ot-opt input{margin-top:3px;accent-color:var(--orange)}

/* Sig */
.sig-wrap{border:1.5px solid var(--gray-300);border-radius:6px;overflow:hidden;background:#FAFAFA}
canvas{display:block;cursor:crosshair;touch-action:none;width:100%;height:120px}
.sig-ctrl{display:flex;padding:5px 10px;background:var(--gray-50);border-top:1px solid var(--gray-200)}
.btn-clr{font-size:11px;color:var(--gray-700);background:#fff;border:1px solid var(--gray-300);border-radius:4px;padding:3px 9px;cursor:pointer;font-family:inherit}

/* Saved badge */
.saved-badge{background:var(--green-light);border:1.5px solid #82E0AA;border-radius:8px;padding:12px 14px;display:flex;align-items:center;gap:10px;font-size:13px;color:#1E8449;font-weight:600;margin:14px 16px}

/* Action bar */
.action-bar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--gray-200);padding:11px 20px;display:flex;gap:10px;justify-content:space-between;align-items:center;box-shadow:0 -4px 12px rgba(0,0,0,.08);z-index:100}
.progress{font-size:12px;color:var(--gray-500)}
.btn{padding:10px 22px;border-radius:6px;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;border:none;transition:all .15s;display:inline-flex;align-items:center;gap:6px}
.btn-purple{background:var(--purple);color:#fff}
.btn-secondary{background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-300)}
.btn:disabled{opacity:.4;cursor:not-allowed}

#toast{position:fixed;bottom:70px;left:50%;transform:translateX(-50%) translateY(40px);background:var(--gray-900);color:#fff;padding:10px 20px;border-radius:8px;font-size:13px;z-index:9999;transition:all .3s;opacity:0;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0);opacity:1}
#toast.success{background:var(--green)}
#toast.error{background:var(--red)}

#loading{text-align:center;padding:80px 20px;color:var(--gray-500)}
#main-content{display:none}
#success-screen{display:none;padding:50px 20px;text-align:center}

@media(max-width:600px){.form-grid{grid-template-columns:1fr}.binfo{grid-template-columns:1fr 1fr}.cl-table th:not(:first-child){width:70px}}
</style>
</head>
<body>
<div class="site-header">
  <div class="header-inner">
    <div class="logo">APET</div>
    <div>
      <div class="htitle">📋 Checklist จป.วิชาชีพ</div>
      <div class="hsub">ก่อนเริ่มงาน / ขณะปฏิบัติงาน / หลังเสร็จงาน</div>
    </div>
    <div class="hright"><a href="dashboard.html" class="btn-hdr">📊 Dashboard</a></div>
  </div>
</div>

<div class="page">
  <div id="loading">🔄 กำลังโหลดข้อมูล...</div>
  <div id="main-content">

    <div class="permit-banner">
      <div class="bid" id="bId">—</div>
      <div class="bco" id="bCo">—</div>
      <div class="binfo" id="bInfo"></div>
    </div>

    <div class="ot-alert" id="otAlert">
      <div class="ot-title">⏰ ผู้รับเหมาขอต่อเวลาทำงาน</div>
      <div class="ot-detail" id="otDetail">—</div>
    </div>

    <!-- Phase Tabs -->
    <div class="phase-tabs">
      <div class="phase-tab active" id="tab1" onclick="switchPhase(1)">
        <span class="phase-num">1</span>ก่อนเริ่มงาน
      </div>
      <div class="phase-tab" id="tab2" onclick="switchPhase(2)">
        <span class="phase-num">2</span>ขณะปฏิบัติงาน
      </div>
      <div class="phase-tab" id="tab3" onclick="switchPhase(3)">
        <span class="phase-num">3</span>หลังเสร็จงาน
      </div>
    </div>

    <!-- PHASES -->
    <div id="phase1"></div>
    <div id="phase2" style="display:none"></div>
    <div id="phase3" style="display:none"></div>

  </div>
  <div id="success-screen">
    <div style="font-size:52px;margin-bottom:14px" id="succIcon">✅</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:8px" id="succTitle">—</div>
    <div style="font-size:13px;color:var(--gray-700);margin-bottom:20px" id="succSub">—</div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
      <button class="btn btn-purple" id="succNext" onclick="goNext()" style="display:none">ถัดไป →</button>
      <a href="dashboard.html" class="btn btn-secondary">📊 Dashboard</a>
    </div>
  </div>
</div>

<div class="action-bar" id="actionBar" style="display:none">
  <div class="progress" id="progressText">—</div>
  <div style="display:flex;gap:8px">
    <button class="btn btn-secondary" onclick="history.back()">← กลับ</button>
    <button class="btn btn-purple" id="btnSave" onclick="savePhase()">💾 บันทึกช่วงนี้</button>
  </div>
</div>
<div id="toast"></div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzGzsisnsQRVypgSwQP6XnjBqteucMgXD-k1cRT3mQEuWCY-XNrWZ49HcNtnEdr0aY3Sw/exec';

// ===== CHECKLIST DATA (ครบถ้วนตามต้นฉบับ) =====
const ITEMS = {
  general: [
    'ปิดแยกระบบที่เกี่ยวข้อง',
    'ตรวจสอบอุปกรณ์ให้อยู่ในสภาพดีก่อนใช้งาน',
    'กั้นพื้นที่และติดป้ายเตือนในบริเวณที่ปฏิบัติงาน',
    'พื้นที่ปฏิบัติงานต้องปราศจากสิ่งของกีดขวาง',
    'เก็บอุปกรณ์หรือสิ่งไม่จำเป็นออกจากพื้นที่',
    'แต่งกายเหมาะสมกับชนิดของงาน/อุปกรณ์ป้องกันภัยส่วนบุคคล',
    'ปฏิบัติงานเสร็จสิ้น',
    'ขอต่อเวลาทำงาน',
    'ทำความสะอาดพื้นที่หลังเสร็จงาน',
    'การเก็บอุปกรณ์เป็นระเบียบ',
  ],
  hotwork: [
    'ถังดับเพลิง',
    'กรณีพื้นที่ปิดต้องมีการระบายอากาศที่เหมาะสม',
    'เคลื่อนย้ายวัสดุติดไฟ/สารไวไฟออกจากพื้นที่ทำงาน',
    'เชื้อเพลิงที่สามารถติดไฟได้ในบริเวณพื้นที่ทำงาน',
  ],
  confined: [
    'ผู้ปฏิบัติงาน ผู้ช่วยเหลือ ผู้ควบคุม ผู้ได้รับอนุญาต ผ่านการอบรม',
    'ผู้ปฏิบัติงาน มีสุขภาพสมบูรณ์จากการตรวจสุขภาพ',
    'ปริมาณออกซิเจน ร้อยละ 19.5–23.5',
    'ปริมาณสารไวไฟ ไม่เกินร้อยละ 10 LEL',
    'ปริมาณสารเคมีอื่นๆ ระบุ',
    'แสงสว่างเพียงพอ',
    'ผู้ช่วยเหลือต้องอยู่บริเวณทางเข้า–ออกตลอดเวลา',
  ],
  high: [
    'ผู้ปฏิบัติงาน ผ่านการอบรม',
    'ผู้ปฏิบัติงาน สวมใส่อุปกรณ์ป้องกันการตกและผูกรัดเครื่องมือ',
    'บันไดแข็งแรงและติดตั้งถูกต้อง',
    'นั่งร้านมีโครงสร้างแข็งแรง มีการค้ำยันถูกต้อง',
    'ปิดกั้นนั่งร้านไม่ให้มีช่องโหว่ที่วัสดุรั่วหล่นได้',
    'นั่งร้านเคลื่อนที่ได้ล้อล็อคได้',
    'มีการติดป้ายอนุญาตให้ใช้งานหลังผ่านการตรวจสอบ',
    'ผู้ปฏิบัติงาน มีสุขภาพสมบูรณ์จากการตรวจสุขภาพ',
    'สภาพเครื่องจักรที่ใช้ทำงานบนที่สูง',
    'ใบรับรองการตรวจสภาพเครื่องจักร',
  ],
};

const PHASE_NAMES = {1:'before', 2:'during', 3:'after'};
const PHASE_LABELS = {1:'ก่อนเริ่มงาน', 2:'ขณะปฏิบัติงาน', 3:'หลังเสร็จงาน'};

let permitData = null;
let permitId = '';
let currentPhase = 1;
let hazardTypes = '';
let savedPhases = {1:false, 2:false, 3:false};
let checkStates = {};  // key: "type_phaseNum_idx" → 'ok'|'ng'|'na'|null
let trainingStatus = '';
let sigCtxs = {};

// ===== INIT =====
document.addEventListener('DOMContentLoaded', async () => {
  const params = new URLSearchParams(window.location.search);
  permitId = params.get('id') || '';
  if (!permitId) { document.getElementById('loading').innerHTML = '❌ ไม่พบ Permit ID'; return; }

  // โหลด local cache ก่อน
  loadLocal();
  await loadPermit();
  buildAllPhases();
  restoreChecks();
  renderTabs();
  showPhase(1);
  // โหลดข้อมูล OT หลัง DOM พร้อม
  setTimeout(() => loadOTData(), 500);

  document.getElementById('loading').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('actionBar').style.display = 'flex';
  updateProgress();
});

// ===== LOAD =====
async function loadPermit() {
  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 8000);
    const res = await fetch(`${APPS_SCRIPT_URL}?action=get_approval&id=${encodeURIComponent(permitId)}`, {
      signal: controller.signal, redirect: 'follow', mode: 'cors'
    });
    const json = JSON.parse(await res.text());
    if (json.success && json.permit) permitData = json.permit;
  } catch(e) {
    permitData = {permit_id: permitId, company_name:'Demo', supervisor:'—', hazard_types:'', work_date:'—', work_area:'—', worker_count:0, overtime_start:'', overtime_end:''};
  }

  hazardTypes = (permitData.hazard_types||'').toLowerCase();
  renderBanner();

  // OT alert
  if (permitData.overtime_start && permitData.overtime_end) {
    document.getElementById('otAlert').classList.add('show');
    document.getElementById('otDetail').textContent =
      `ขอต่อเวลา ${permitData.overtime_start} — ${permitData.overtime_end} น. (รอ จป. อนุมัติ)`;
  }
}

function renderBanner() {
  const p = permitData;
  document.getElementById('bId').textContent = p.permit_id;
  document.getElementById('bCo').textContent = (p.company_name||'—')+' | '+(p.supervisor||'—');
  document.getElementById('bInfo').innerHTML = [
    {l:'วันที่ทำงาน', v: p.work_date},
    {l:'พื้นที่', v: p.work_area},
    {l:'จำนวนคน', v: (p.worker_count||0)+' คน'},
  ].map(x=>`<div class="bi"><div class="bil">${x.l}</div><div class="biv">${x.v||'—'}</div></div>`).join('');
}

// ===== BUILD PHASES =====
function buildAllPhases() {
  [1,2,3].forEach(ph => buildPhase(ph));
}

function buildPhase(ph) {
  const container = document.getElementById('phase'+ph);
  const pname = PHASE_NAMES[ph];
  let html = '';

  // Training (phase 1 only)
  if (ph === 1) {
    html += `<div class="card">
      <div class="card-header"><div class="card-icon" style="background:var(--orange-light)">🎓</div>
        <div><div class="card-title">สถานะการอบรมกฎระเบียบ</div></div></div>
      <div class="card-body">
        <div class="form-pad">
          <div class="form-label">ผู้รับเหมาผ่านการอบรมกฎระเบียบความปลอดภัย</div>
          <div class="train-options">
            <button class="train-btn pass" id="trainPass" onclick="setTraining('pass')">✅ ผ่านการอบรมแล้ว</button>
            <button class="train-btn fail" id="trainFail" onclick="setTraining('fail')">❌ ยังไม่ผ่าน</button>
          </div>
        </div>
      </div>
    </div>`;
  }

  // General checklist
  html += buildCheckCard('📋', 'การปฏิบัติเพื่อความปลอดภัยสำหรับงานทั่วไป', 'general', ph, ITEMS.general);

  // Hotwork (conditional)
  html += `<div class="cond-section ${hazardTypes.includes('hotwork')?'show':''}" id="hotwork_card_${ph}">`;
  html += buildCheckCard('🔥', 'งานที่ก่อให้เกิดความร้อน/ประกายไฟ (Hot Work)', 'hotwork', ph, ITEMS.hotwork);
  // เพิ่มช่องกรอกเชื้อเพลิง
  html += `<div class="card" style="margin-top:-10px;border-top:none;border-radius:0 0 10px 10px;margin-bottom:14px">
    <div class="card-body"><div class="form-pad" style="padding-top:10px">
      <div style="font-size:12px;font-weight:600;color:var(--gray-700);margin-bottom:8px">เชื้อเพลิงที่สามารถติดไฟได้ในบริเวณพื้นที่ทำงาน</div>
      <div id="fuelList_${ph}">
        <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
          <span style="font-size:12px;color:var(--gray-500);min-width:20px">1.</span>
          <input type="text" id="fuel_${ph}_0" placeholder="ระบุเชื้อเพลิง..." style="flex:1">
        </div>
        <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
          <span style="font-size:12px;color:var(--gray-500);min-width:20px">2.</span>
          <input type="text" id="fuel_${ph}_1" placeholder="ระบุเชื้อเพลิง..." style="flex:1">
        </div>
        <div style="display:flex;gap:8px;margin-bottom:6px;align-items:center">
          <span style="font-size:12px;color:var(--gray-500);min-width:20px">3.</span>
          <input type="text" id="fuel_${ph}_2" placeholder="ระบุเชื้อเพลิง..." style="flex:1">
        </div>
      </div>
      <button onclick="addFuel(${ph})" style="font-size:12px;color:var(--blue);background:none;border:1px dashed var(--blue);border-radius:6px;padding:4px 12px;cursor:pointer;margin-top:4px">+ เพิ่มรายการ</button>
    </div></div>
  </div>`;
  html += `</div>`;

  // Confined (conditional)
  html += `<div class="cond-section ${hazardTypes.includes('confined')?'show':''}" id="confined_card_${ph}">`;
  html += buildCheckCard('🏠', 'งานในที่อับอากาศ (Confined Spaces)', 'confined', ph, ITEMS.confined);
  html += `</div>`;

  // High work (conditional)
  html += `<div class="cond-section ${(hazardTypes.includes('high')||hazardTypes.includes('highrisk'))?'show':''}" id="high_card_${ph}">`;
  html += buildCheckCard('📏', 'งานบนที่สูง ≥2 เมตร (Work at High)', 'high', ph, ITEMS.high);
  html += `</div>`;

  // OT Decision (phase 2) — แสดงเสมอถ้ามีการขอต่อเวลา (ทั้งจาก index.html และ overtime.html)
  if (ph === 2) {
    html += `<div class="card" id="otDecisionCard" style="border:2px solid var(--orange)">
      <div class="card-header" style="background:var(--orange-light)">
        <div class="card-icon" style="background:rgba(230,126,34,.2)">⏰</div>
        <div>
          <div class="card-title" style="color:var(--orange)">การอนุมัติต่อเวลา</div>
          <div id="otDecisionSub" style="font-size:11px;color:#856404">โหลดข้อมูลการขอต่อเวลา...</div>
        </div>
      </div>
      <div class="card-body"><div class="form-pad">
        <div class="ot-decision">
          <label class="ot-opt"><input type="radio" name="otDecision" value="approved_same"> ✅ อนุญาตให้ทำงานต่อได้ สภาพความปลอดภัยคงเดิม</label>
          <label class="ot-opt" style="flex-wrap:wrap">
            <input type="radio" name="otDecision" value="rejected"> ❌ ไม่อนุญาต เพราะ
            <input type="text" id="otReason" placeholder="ระบุเหตุผล..." style="margin-left:6px;flex:1;min-width:150px;height:30px;padding:3px 8px;display:inline-block">
          </label>
          <label class="ot-opt"><input type="radio" name="otDecision" value="approved_fixed"> 🔧 ทำการแก้ไขแล้ว สภาพปลอดภัย อนุญาตทำงานต่อ</label>
          <label class="ot-opt"><input type="radio" name="otDecision" value="na" checked> — ไม่มีการขอต่อเวลา</label>
        </div>
      </div></div>
    </div>`;
  }

  // Signature
  html += `<div class="card">
    <div class="card-header"><div class="card-icon" style="background:var(--purple-light)">✍️</div>
      <div><div class="card-title">ลายเซ็น จป.วิชาชีพ — ${PHASE_LABELS[ph]}</div></div></div>
    <div class="card-body">
      <div id="sigArea${ph}">
        <div class="form-pad">
          <div class="form-grid" style="margin-bottom:12px">
            <div class="form-group"><label class="form-label">ชื่อ จป.วิชาชีพ *</label><input type="text" id="inspName${ph}" placeholder="ชื่อ-นามสกุล"></div>
            <div class="form-group"><label class="form-label">วันที่/เวลา</label><input type="text" id="inspDate${ph}" value="${new Date().toLocaleString('th-TH')}"></div>
          </div>
          <div class="sig-wrap"><canvas id="sig${ph}"></canvas>
            <div class="sig-ctrl"><button class="btn-clr" onclick="clearSig(${ph})">🗑️ ล้าง</button><span style="font-size:10px;color:var(--gray-500);margin-left:auto">วาดด้วยนิ้วหรือเมาส์</span></div>
          </div>
          <div class="form-group" style="margin-top:10px"><label class="form-label">หมายเหตุ</label><textarea id="inspNote${ph}" placeholder="ข้อสังเกต..."></textarea></div>
        </div>
      </div>
    </div>
  </div>`;

  container.innerHTML = html;
}

function buildCheckCard(icon, title, type, ph, items) {
  let rows = items.map((label, idx) => {
    const key = `${type}_${ph}_${idx}`;
    return `<tr>
      <td>${idx+1}. ${label}</td>
      <td><div class="rg">
        <button class="rb ok" data-key="${key}" data-val="ok" onclick="setCheck(this)">✓</button>
        <button class="rb ng" data-key="${key}" data-val="ng" onclick="setCheck(this)">✗</button>
        <button class="rb na" data-key="${key}" data-val="na" onclick="setCheck(this)">-</button>
      </div></td>
    </tr>`;
  }).join('');
  return `<div class="card">
    <div class="card-header"><div class="card-icon" style="background:var(--blue-light)">${icon}</div>
      <div><div class="card-title">${title}</div></div></div>
    <div class="card-body">
      <table class="cl-table">
        <thead><tr><th>รายการตรวจสอบ</th><th>ผล</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
  </div>`;
}

// ===== CHECKS =====
function setCheck(btn) {
  const key = btn.dataset.key;
  const val = btn.dataset.val;
  btn.closest('.rg').querySelectorAll('.rb').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  checkStates[key] = val;
  saveLocal();
}

function setTraining(s) {
  trainingStatus = s;
  document.getElementById('trainPass')?.classList.toggle('active', s==='pass');
  document.getElementById('trainFail')?.classList.toggle('active', s==='fail');
  saveLocal();
}

function restoreChecks() {
  // restore check buttons
  Object.entries(checkStates).forEach(([key, val]) => {
    if (!val) return;
    const btn = document.querySelector(`button[data-key="${key}"][data-val="${val}"]`);
    if (btn) btn.classList.add('active');
  });
  // restore training
  if (trainingStatus) {
    document.getElementById('trainPass')?.classList.toggle('active', trainingStatus==='pass');
    document.getElementById('trainFail')?.classList.toggle('active', trainingStatus==='fail');
  }
  // restore saved sigs
  [1,2,3].forEach(ph => {
    if (savedPhases[ph]) markPhaseSaved(ph);
  });
}

// ===== PHASE SWITCH =====
function switchPhase(ph) {
  currentPhase = ph;
  showPhase(ph);
  updateProgress();
  // โหลด OT ทุกครั้งที่ไป phase 2
  if (ph === 2) setTimeout(() => loadOTData(), 200);
}

function showPhase(ph) {
  [1,2,3].forEach(i => {
    document.getElementById('phase'+i).style.display = i===ph ? 'block' : 'none';
    document.getElementById('tab'+i).classList.toggle('active', i===ph);
  });
  // init canvas ถ้ายังไม่ done
  if (!savedPhases[ph]) setTimeout(() => initSig(ph), 100);
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderTabs() {
  [1,2,3].forEach(ph => {
    const tab = document.getElementById('tab'+ph);
    tab.classList.toggle('saved', !!savedPhases[ph]);
  });
}

function updateProgress() {
  const done = [1,2,3].filter(ph => savedPhases[ph]).length;
  document.getElementById('progressText').textContent = `บันทึกแล้ว ${done}/3 ช่วง`;
}

function markPhaseSaved(ph) {
  // replace sigArea with saved badge
  const info = savedPhases[ph];
  if (!info || typeof info !== 'object') return;
  const area = document.getElementById('sigArea'+ph);
  if (area) {
    area.innerHTML = `<div class="saved-badge">✅ บันทึกแล้ว — ${info.name} <span style="font-size:11px;font-weight:400;margin-left:8px">${info.date||''}</span></div>`;
  }
  document.getElementById('tab'+ph)?.classList.add('saved');
}

// ===== SIGNATURE =====
function initSig(ph) {
  const canvas = document.getElementById('sig'+ph);
  if (!canvas || sigCtxs[ph]) return;
  canvas.width = 900; canvas.height = 155;
  const ctx = canvas.getContext('2d');
  ctx.strokeStyle = '#202124'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  sigCtxs[ph] = ctx;
  let drawing=false, lx=0, ly=0;
  const pos = e => {
    const r = canvas.getBoundingClientRect();
    const src = e.touches ? e.touches[0] : e;
    return {x:(src.clientX-r.left)*canvas.width/r.width, y:(src.clientY-r.top)*canvas.height/r.height};
  };
  canvas.addEventListener('mousedown', e=>{drawing=true;const p=pos(e);lx=p.x;ly=p.y;});
  canvas.addEventListener('mousemove', e=>{if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;});
  canvas.addEventListener('mouseup', ()=>drawing=false);
  canvas.addEventListener('mouseleave', ()=>drawing=false);
  canvas.addEventListener('touchstart', e=>{e.preventDefault();drawing=true;const p=pos(e);lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener('touchmove', e=>{e.preventDefault();if(!drawing)return;const p=pos(e);ctx.beginPath();ctx.moveTo(lx,ly);ctx.lineTo(p.x,p.y);ctx.stroke();lx=p.x;ly=p.y;},{passive:false});
  canvas.addEventListener('touchend', ()=>drawing=false);
}

function clearSig(ph) {
  delete sigCtxs[ph];
  const c = document.getElementById('sig'+ph);
  if (c) c.getContext('2d').clearRect(0,0,900,155);
}

function isSigEmpty(ph) {
  const c = document.getElementById('sig'+ph);
  if (!c) return true;
  return !c.getContext('2d').getImageData(0,0,900,155).data.some(v=>v!==0);
}

// ===== SAVE PHASE =====
async function savePhase() {
  const ph = currentPhase;
  const name = document.getElementById('inspName'+ph)?.value.trim();
  if (!name) { showToast('กรุณากรอกชื่อ จป.', 'error'); return; }
  if (isSigEmpty(ph)) { showToast('กรุณาลงลายเซ็น', 'error'); return; }

  const btn = document.getElementById('btnSave');
  btn.disabled = true; btn.textContent = '⏳ กำลังบันทึก...';

  const date = document.getElementById('inspDate'+ph)?.value || new Date().toLocaleString('th-TH');
  const note = document.getElementById('inspNote'+ph)?.value || '';
  const savedAt = new Date().toLocaleString('th-TH');
  const pname = PHASE_NAMES[ph];

  // เก็บ phase checks
  const phaseChecks = {};
  Object.entries(checkStates).forEach(([k,v]) => {
    if (k.includes(`_${ph}_`)) phaseChecks[k] = v;
  });

  const ot = ph===2 ? (document.querySelector('input[name="otDecision"]:checked')?.value||'na') : '';
  const otReason = document.getElementById('otReason')?.value || '';

  // เก็บรายการเชื้อเพลิง (hotwork)
  const fuels = [];
  const count = fuelCounts[ph] || 3;
  for (let i=0; i<count; i++) {
    const v = document.getElementById(`fuel_${ph}_${i}`)?.value.trim();
    if (v) fuels.push(v);
  }

  // บันทึก local ทันที
  savedPhases[ph] = {name, date, savedAt};
  saveLocal();

  // ส่ง server
  try {
    await fetch(APPS_SCRIPT_URL, {
      method:'POST', mode:'no-cors',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        type: 'checklist_phase',
        permitId,
        phase: pname,
        phaseNum: ph,
        inspectorName: name,
        inspectorDate: date,
        inspectorNote: note,
        trainingStatus: ph===1 ? trainingStatus : '',
        checkStates: phaseChecks,
        overtime: ot,
        otRejectReason: otReason,
        hotworkFuels: fuels.join(', '),
        savedAt,
      }),
    });
  } catch(e) { console.warn(e); }

  btn.disabled = false; btn.textContent = '💾 บันทึกช่วงนี้';

  // แสดงผล — ไม่เปลี่ยนหน้า
  markPhaseSaved(ph);
  renderTabs();
  updateProgress();
  showToast(`✅ บันทึก "${PHASE_LABELS[ph]}" เรียบร้อยแล้ว`, 'success');

  // ถ้าครบ 3 ช่วง
  const allDone = savedPhases[1] && savedPhases[2] && savedPhases[3];
  if (allDone) {
    setTimeout(() => {
      document.getElementById('main-content').style.display = 'none';
      document.getElementById('actionBar').style.display = 'none';
      document.getElementById('succIcon').textContent = '🎉';
      document.getElementById('succTitle').textContent = 'บันทึก Checklist ครบทุกช่วงแล้ว!';
      document.getElementById('succSub').textContent = permitId + ' — บันทึกเวลา ' + savedAt;
      document.getElementById('succNext').style.display = 'none';
      document.getElementById('success-screen').style.display = 'block';
      window.scrollTo({top:0, behavior:'smooth'});
    }, 1200);
  } else {
    // scroll ไปช่วงถัดไป
    const nextPh = [1,2,3].find(p => !savedPhases[p]);
    if (nextPh) {
      setTimeout(() => {
        document.getElementById('succIcon').textContent = '✅';
        document.getElementById('succTitle').textContent = `บันทึก "${PHASE_LABELS[ph]}" เรียบร้อย`;
        document.getElementById('succSub').textContent = `ยังเหลือ: ${[1,2,3].filter(p=>!savedPhases[p]).map(p=>PHASE_LABELS[p]).join(', ')}`;
        const btnNext = document.getElementById('succNext');
        btnNext.style.display = 'inline-flex';
        btnNext.textContent = `ถัดไป: ${PHASE_LABELS[nextPh]} →`;
        btnNext.dataset.next = nextPh;
        document.getElementById('main-content').style.display = 'none';
        document.getElementById('actionBar').style.display = 'none';
        document.getElementById('success-screen').style.display = 'block';
        window.scrollTo({top:0, behavior:'smooth'});
      }, 1200);
    }
  }
}

function goNext() {
  const nextPh = parseInt(document.getElementById('succNext').dataset.next);
  document.getElementById('success-screen').style.display = 'none';
  document.getElementById('main-content').style.display = 'block';
  document.getElementById('actionBar').style.display = 'flex';
  switchPhase(nextPh);
}

// ===== LOCAL STORAGE =====
// ===== FUEL ROWS =====
let fuelCounts = {1:3, 2:3, 3:3};
function addFuel(ph) {
  fuelCounts[ph] = (fuelCounts[ph]||3) + 1;
  const n = fuelCounts[ph];
  const list = document.getElementById('fuelList_'+ph);
  if (!list) return;
  const div = document.createElement('div');
  div.style.cssText = 'display:flex;gap:8px;margin-bottom:6px;align-items:center';
  div.innerHTML = `<span style="font-size:12px;color:var(--gray-500);min-width:20px">${n}.</span>
    <input type="text" id="fuel_${ph}_${n-1}" placeholder="ระบุเชื้อเพลิง..." style="flex:1">`;
  list.appendChild(div);
}

// ===== โหลด OT จาก server (ทั้งจาก permit และ overtime.html) =====
async function loadOTData() {
  let otData = null;

  // 1. ลองดึงจาก Overtime sheet ก่อน (overtime.html ส่งมา)
  try {
    const controller = new AbortController();
    setTimeout(() => controller.abort(), 6000);
    const res = await fetch(`${APPS_SCRIPT_URL}?action=get_overtime&id=${encodeURIComponent(permitId)}`, {
      signal: controller.signal, redirect:'follow', mode:'cors'
    });
    const json = JSON.parse(await res.text());
    if (json.success && json.overtime && json.overtime.otStart) {
      otData = json.overtime;
    }
  } catch(e) { /* fallback below */ }

  // 2. Fallback: ใช้จากข้อมูลใบอนุญาต (index.html กรอก)
  if (!otData && permitData?.overtime_start && permitData?.overtime_end) {
    otData = {
      otStart: permitData.overtime_start,
      otEnd: permitData.overtime_end,
      contractorName: permitData.supervisor || '—',
      requestedAt: '',
    };
  }

  // แสดง OT alert ด้านบน
  const alertEl = document.getElementById('otAlert');
  const detailEl = document.getElementById('otDetail');
  if (otData) {
    if (alertEl) alertEl.classList.add('show');
    if (detailEl) detailEl.innerHTML = `
      <strong>⏰ ขอต่อเวลา ${otData.otStart} — ${otData.otEnd} น.</strong><br>
      ผู้ขอ: ${otData.contractorName||'—'}${otData.requestedAt?' | เวลา '+otData.requestedAt:''}`;
  } else {
    if (alertEl) alertEl.classList.remove('show');
  }

  // อัปเดต OT decision card (phase 2)
  const sub = document.getElementById('otDecisionSub');
  if (sub) {
    sub.textContent = otData
      ? `⚠️ ขอต่อเวลา ${otData.otStart} — ${otData.otEnd} น. | ผู้ขอ: ${otData.contractorName||'—'}`
      : '— ไม่มีการขอต่อเวลา';
  }

  // ถ้ามี OT → ยกเลิก default "na" ให้ต้องเลือกจริง
  if (otData) {
    const naRadio = document.querySelector('input[name="otDecision"][value="na"]');
    if (naRadio) naRadio.checked = false;
    // highlight card
    const card = document.getElementById('otDecisionCard');
    if (card) card.style.borderColor = '#E67E22';
  }

  // เก็บ otData ไว้ใช้ใน save
  window._otData = otData;
}

function saveLocal() {
  localStorage.setItem('cl_checks_'+permitId, JSON.stringify(checkStates));
  localStorage.setItem('cl_phases_'+permitId, JSON.stringify(savedPhases));
  localStorage.setItem('cl_train_'+permitId, trainingStatus);
}

function loadLocal() {
  try { checkStates = JSON.parse(localStorage.getItem('cl_checks_'+permitId)||'{}'); } catch(e){}
  try { savedPhases = JSON.parse(localStorage.getItem('cl_phases_'+permitId)||'{}'); } catch(e){}
  trainingStatus = localStorage.getItem('cl_train_'+permitId)||'';
}

// ===== TOAST =====
function showToast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = 'show'+(type?' '+type:'');
  clearTimeout(t._t); t._t = setTimeout(()=>t.className='', 3000);
}
</script>
