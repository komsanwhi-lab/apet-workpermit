<!DOCTYPE html><html><body onload="loadDashboard()">
<h2>Dashboard</h2>
<table border="1"><tbody id="t"></tbody></table>
<script src="core.js"></script>
<script>
function loadDashboard(){
 const data=getPermits(); const t=document.getElementById("t"); t.innerHTML="";
 data.forEach(p=>{
  t.innerHTML+=`<tr>
   <td>${p.id}</td>
   <td>${p.company||""}</td>
   <td>${p.status}</td>
   <td>
    <button onclick="go('${p.id}','dept')">Dept</button>
    <button onclick="go('${p.id}','safety')">Safety</button>
    <button onclick="go('${p.id}','chairman')">Chairman</button>
   </td>
  </tr>`;
 });
}
function go(id,r){location.href=`inspector.html?id=${id}&role=${r}`}
</script>
</body></html>
