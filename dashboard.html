<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard — APET Work Permit</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --red:#C0392B;--red-light:#FADBD8;--green:#27AE60;--green-light:#D5F5E3;--orange:#E67E22;--orange-light:#FDEBD0;
  --blue:#2980B9;--blue-light:#D6EAF8;--purple:#7C5CBF;--purple-light:#EAD7FF;--gray-50:#F8F9FA;--gray-100:#F1F3F4;
  --gray-200:#E8EAED;--gray-300:#DADCE0;--gray-500:#9AA0A6;--gray-700:#5F6368;--gray-900:#202124;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Sarabun',sans-serif;background:#F0F2F5;color:var(--gray-900)}
.site-header{background:#1A252F;position:sticky;top:0;z-index:20;box-shadow:0 2px 10px rgba(0,0,0,.12)}
.header-inner{max-width:1180px;margin:0 auto;padding:14px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.header-logo{background:var(--red);color:#fff;border-radius:8px;padding:5px 10px;font-weight:700;letter-spacing:.4px}
.header-title{color:#fff;font-size:15px;font-weight:600}
.header-sub{color:rgba(255,255,255,.7);font-size:12px}
.header-right{margin-left:auto;display:flex;gap:8px;flex-wrap:wrap}
.btn-header{background:rgba(255,255,255,.1);color:#fff;border:1px solid rgba(255,255,255,.2);padding:8px 14px;border-radius:8px;text-decoration:none;font-size:13px}
.page{max-width:1180px;margin:0 auto;padding:18px 14px 40px}
.stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat-card{background:#fff;border-radius:14px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.05);display:flex;gap:12px;align-items:flex-start}
.stat-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0}
.stat-icon.red{background:var(--red-light)}.stat-icon.green{background:var(--green-light)}.stat-icon.orange{background:var(--orange-light)}.stat-icon.blue{background:var(--blue-light)}
.stat-num{font-size:28px;font-weight:700;line-height:1}.stat-label{font-size:12px;color:var(--gray-500);margin-top:4px}.stat-sub{font-size:11px;color:var(--gray-500);margin-top:2px}
.card{background:#fff;border-radius:14px;box-shadow:0 2px 8px rgba(0,0,0,.05);overflow:hidden}
.card-header{padding:16px 18px;border-bottom:1px solid var(--gray-200);display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap}
.card-title{font-size:15px;font-weight:700}.card-sub{font-size:12px;color:var(--gray-500);margin-top:2px}
.toolbar{padding:14px 18px;border-bottom:1px solid var(--gray-200);display:grid;grid-template-columns:2fr 1fr 1fr 1fr;gap:10px}
.input,.select{width:100%;border:1.5px solid var(--gray-300);border-radius:10px;padding:10px 12px;font:inherit;background:#fff}
.input:focus,.select:focus{outline:none;border-color:var(--red);box-shadow:0 0 0 3px rgba(192,57,43,.1)}
.role-chip{display:inline-flex;align-items:center;gap:6px;background:var(--gray-50);border:1px solid var(--gray-200);padding:6px 10px;border-radius:999px;font-size:12px;color:var(--gray-700)}
.table-wrap{overflow:auto}.permits-table{width:100%;border-collapse:collapse;font-size:13px}.permits-table th{background:var(--gray-50);text-align:left;padding:12px 14px;font-size:11px;text-transform:uppercase;letter-spacing:.5px;color:var(--gray-700);border-bottom:2px solid var(--gray-200)}.permits-table td{padding:12px 14px;border-bottom:1px solid var(--gray-100);vertical-align:top}.permits-table tr:hover td{background:var(--gray-50)}
.permit-id{font-family:monospace;font-weight:700}.company-name{font-weight:600}.subtext{font-size:12px;color:var(--gray-500);margin-top:2px}.work-area{max-width:220px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.hazard-tags{display:flex;flex-wrap:wrap;gap:4px}.hazard-tag{background:var(--red-light);color:var(--red);padding:2px 7px;border-radius:999px;font-size:10px;font-weight:600}
.badge{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 10px;font-size:11px;font-weight:700;white-space:nowrap}
.action-btns{display:flex;gap:6px;flex-wrap:wrap}.btn-sm{padding:6px 9px;border-radius:8px;border:1px solid var(--gray-300);background:#fff;font:inherit;font-size:11px;cursor:pointer}.btn-view{border-color:var(--blue);color:var(--blue)}.btn-qr{border-color:var(--orange);color:var(--orange)}.btn-dept{border-color:var(--blue);color:var(--blue)}.btn-inspector{border-color:var(--purple);color:var(--purple)}.btn-chairman{border-color:var(--green);color:var(--green)}.btn-checklist{border-color:var(--orange);color:var(--orange)}.btn-print{border-color:#5F6368;color:#5F6368}.btn-close{border-color:#2C3E50;color:#2C3E50}
.mobile-list{display:none;padding:14px}.permit-card{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:14px;padding:14px;margin-bottom:12px}.permit-top{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:10px}.permit-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px 10px;margin-bottom:10px}.label{font-size:11px;color:var(--gray-500);text-transform:uppercase}.value{font-size:13px;font-weight:600}.empty-state,.loading{padding:40px 18px;text-align:center;color:var(--gray-500)}
#toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(80px);background:#202124;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;transition:transform .3s;z-index:50}.show{transform:translateX(-50%) translateY(0)}.success{background:var(--green)}
@media(max-width:980px){.stats-grid{grid-template-columns:repeat(2,1fr)}.toolbar{grid-template-columns:1fr 1fr}}
@media(max-width:760px){.header-right{margin-left:0}.stats-grid{grid-template-columns:1fr 1fr}.table-wrap{display:none}.mobile-list{display:block}.toolbar{grid-template-columns:1fr}.permit-grid{grid-template-columns:1fr 1fr}}
@media(max-width:480px){.stats-grid{grid-template-columns:1fr}.permit-grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="site-header">
  <div class="header-inner">
    <div class="header-logo">APET</div>
    <div>
      <div class="header-title">Dashboard — ใบอนุญาตผู้รับเหมา</div>
      <div class="header-sub" id="headerSub">ภาพรวมทุกบทบาท</div>
    </div>
    <div class="header-right">
      <a href="index.html" class="btn-header">📋 สร้างใบใหม่</a>
      <button class="btn-header" onclick="loadData()">🔄 รีเฟรช</button>
    </div>
  </div>
</div>

<div class="page">
  <div class="stats-grid">
    <div class="stat-card"><div class="stat-icon red">📋</div><div><div class="stat-num" id="statTotal">—</div><div class="stat-label">ทั้งหมด</div><div class="stat-sub" id="statWeek">7 วันล่าสุด: —</div></div></div>
    <div class="stat-card"><div class="stat-icon orange">⏳</div><div><div class="stat-num" id="statPending">—</div><div class="stat-label">ค้างดำเนินการ</div><div class="stat-sub" id="statPendingLabel">ตามบทบาทที่เลือก</div></div></div>
    <div class="stat-card"><div class="stat-icon green">✅</div><div><div class="stat-num" id="statApproved">—</div><div class="stat-label">อนุมัติแล้ว</div><div class="stat-sub" id="statApprovedPct">—</div></div></div>
    <div class="stat-card"><div class="stat-icon blue">👤</div><div><div class="stat-num" id="statRole">—</div><div class="stat-label">บทบาทปัจจุบัน</div><div class="stat-sub">เปลี่ยนมุมมองได้จากตัวกรอง</div></div></div>
  </div>

  <div class="card">
    <div class="card-header">
      <div>
        <div class="card-title">รายการใบอนุญาต</div>
        <div class="card-sub" id="tableCount">กำลังโหลด...</div>
      </div>
      <div class="role-chip" id="roleSummaryChip">🧭 ทุกบทบาท</div>
    </div>

    <div class="toolbar">
      <input id="searchInput" class="input" placeholder="ค้นหาเลข Permit, บริษัท, พื้นที่" oninput="filterTable()">
      <select id="roleFilter" class="select" onchange="changeRole()">
        <option value="all">ทุกบทบาท</option>
        <option value="contractor">ผู้รับเหมา</option>
        <option value="dept">แผนกที่ว่าจ้าง</option>
        <option value="inspector">จป.วิชาชีพ</option>
        <option value="chairman">ประธาน คปอ.</option>
      </select>
      <select id="statusFilter" class="select" onchange="filterTable()">
        <option value="">ทุกสถานะ</option>
        <option value="รอแผนกที่ว่าจ้าง">รอแผนกที่ว่าจ้าง</option>
        <option value="รอ จป.วิชาชีพ">รอ จป.วิชาชีพ</option>
        <option value="รอ ประธาน คปอ.">รอ ประธาน คปอ.</option>
        <option value="อนุมัติ">อนุมัติ</option>
        <option value="ไม่อนุมัติ">ไม่อนุมัติ</option>
        <option value="หมดอายุ">หมดอายุ</option>
        <option value="ปิดงาน">ปิดงาน</option>
      </select>
      <select id="dateFilter" class="select" onchange="filterTable()">
        <option value="">ทุกช่วงเวลา</option>
        <option value="today">วันนี้</option>
        <option value="week">7 วันล่าสุด</option>
        <option value="month">30 วันล่าสุด</option>
      </select>
    </div>

    <div id="tableContainer" class="table-wrap"><div class="loading">🔄 กำลังโหลดข้อมูล...</div></div>
    <div id="mobileContainer" class="mobile-list"></div>
  </div>
</div>

<div id="toast"></div>
<script src="core.js"></script>
<script>
let allPermits = [];
let visiblePermits = [];
let currentRole = APET.getParam('role', 'all');

const DEMO_DATA = [
  { permit_id:'APET-2026-1001', submitted_at:'09/04/2569 09:00', status:'รอแผนกที่ว่าจ้าง', company_name:'บริษัท เอ บี ซี เซอร์วิส จำกัด', supervisor:'นายธนา', work_date:'2026-04-09', time_start:'08:00', time_end:'17:00', work_area:'MCC Room', hazard_types:'electrical, highrisk', worker_count:'3' },
  { permit_id:'APET-2026-1002', submitted_at:'09/04/2569 10:00', status:'รอ จป.วิชาชีพ', company_name:'บริษัท โอเมก้า คูลลิ่ง จำกัด', supervisor:'นางสาววิภา', work_date:'2026-04-09', time_start:'08:00', time_end:'16:00', work_area:'Chiller Roof', hazard_types:'aircon, chemical', worker_count:'2' },
  { permit_id:'APET-2026-1003', submitted_at:'08/04/2569 08:20', status:'รอ ประธาน คปอ.', company_name:'บริษัท เวลด์โปร จำกัด', supervisor:'นายเกียรติ', work_date:'2026-04-08', time_start:'09:00', time_end:'18:00', work_area:'Line 2', hazard_types:'hotwork', worker_count:'4' },
  { permit_id:'APET-2026-1004', submitted_at:'07/04/2569 07:45', status:'อนุมัติ', company_name:'บริษัท ไทยท่อ จำกัด', supervisor:'นายปรีชา', work_date:'2026-04-07', time_start:'07:00', time_end:'17:00', work_area:'Utility Pipe Rack', hazard_types:'waterpipe', worker_count:'2' }
].map(APET.normalizePermit);

const HAZARD_MAP = {
  construction:'🏗️ ก่อสร้าง', electrical:'⚡ ไฟฟ้า', pressure:'💨 ความดัน', machine:'⚙️ เครื่องจักร', aircon:'❄️ แอร์', hotwork:'🔥 งานร้อน',
  waterpipe:'🚰 ท่อน้ำ', fireprotect:'🧯 อัคคีภัย', confined:'🏠 ที่อับอากาศ', windsys:'💨 ระบบลม', hoist:'🏗️ รอก/เครน', highrisk:'📏 งานสูง', gas:'🛢️ ระบบก๊าซ', chemical:'☣️ สารเคมี', other:'📝 อื่นๆ'
};

document.addEventListener('DOMContentLoaded', () => {
  document.getElementById('roleFilter').value = currentRole;
  updateRoleHeader();
  loadData();
});

async function loadData() {
  try {
    const permits = await APET.listPermits();
    allPermits = permits.length ? permits : DEMO_DATA;
  } catch (e) {
    console.warn('load fallback', e);
    allPermits = DEMO_DATA;
  }
  allPermits = allPermits.map(p => ({ ...p, status: APET.getEffectiveStatus(p) }));
  filterTable();
}

function updateRoleHeader() {
  const cfg = APET.ROLES[currentRole] || APET.ROLES.all;
  document.getElementById('headerSub').textContent = `มุมมอง: ${cfg.label}`;
  document.getElementById('roleSummaryChip').textContent = `${cfg.icon} ${cfg.label}`;
  document.getElementById('statRole').textContent = cfg.label;
  document.getElementById('statPendingLabel').textContent = currentRole === 'all' ? 'ทุกคิวงาน' : `คิวของ ${cfg.label}`;
}

function changeRole() {
  currentRole = document.getElementById('roleFilter').value;
  const url = new URL(window.location.href);
  url.searchParams.set('role', currentRole);
  window.history.replaceState({}, '', url);
  updateRoleHeader();
  filterTable();
}

function filterTable() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();
  const status = document.getElementById('statusFilter').value;
  const dateFilter = document.getElementById('dateFilter').value;
  const now = new Date();

  const scoped = APET.getRoleScopedPermits(currentRole, allPermits);
  visiblePermits = scoped.filter(p => {
    const matchSearch = !search || [p.permit_id, p.company_name, p.supervisor, p.work_area].join(' ').toLowerCase().includes(search);
    const matchStatus = !status || p.status === status;
    let matchDate = true;
    if (dateFilter && p.work_date) {
      const d = new Date(p.work_date);
      const days = (now - d) / 86400000;
      if (dateFilter === 'today') matchDate = d.toDateString() === now.toDateString();
      else if (dateFilter === 'week') matchDate = days >= 0 && days <= 7;
      else if (dateFilter === 'month') matchDate = days >= 0 && days <= 30;
    }
    return matchSearch && matchStatus && matchDate;
  });

  renderStats(scoped);
  renderDesktop(visiblePermits);
  renderMobile(visiblePermits);
}

function renderStats(scoped) {
  const total = scoped.length;
  const pending = scoped.filter(p => !!APET.getPendingRoleFromStatus(p.status)).length;
  const approved = scoped.filter(p => p.status === APET.STATUS.APPROVED).length;
  const week = scoped.filter(p => p.work_date && (new Date() - new Date(p.work_date)) / 86400000 <= 7).length;
  document.getElementById('statTotal').textContent = total;
  document.getElementById('statPending').textContent = pending;
  document.getElementById('statApproved').textContent = approved;
  document.getElementById('statWeek').textContent = `7 วันล่าสุด: ${week} ใบ`;
  document.getElementById('statApprovedPct').textContent = total ? `${Math.round((approved/total)*100)}% อัตราอนุมัติ` : '—';
  document.getElementById('tableCount').textContent = `แสดง ${visiblePermits.length} จาก ${total} รายการ`;
}

function badgeClass(status) {
  return {
    'อนุมัติ':'background:#D5F5E3;color:#1E8449',
    'ไม่อนุมัติ':'background:#FADBD8;color:#96281B',
    'รอแผนกที่ว่าจ้าง':'background:#FFF3CD;color:#856404',
    'รอ จป.วิชาชีพ':'background:#EAD7FF;color:#7C5CBF',
    'รอ ประธาน คปอ.':'background:#D6EAF8;color:#185FA5',
    'หมดอายุ':'background:#F2F3F4;color:#5F6368',
    'ปิดงาน':'background:#D5D8DC;color:#2C3E50'
  }[status] || 'background:#FFF3CD;color:#856404';
}

function hazardTags(raw) {
  return String(raw || '').split(',').map(s => s.trim()).filter(Boolean).map(h => `<span class="hazard-tag">${HAZARD_MAP[h] || h}</span>`).join('');
}

function renderActions(p) {
  const a = APET.getActionVisibility(currentRole, p);
  const buttons = [];
  if (a.view) buttons.push(`<button class="btn-sm btn-view" onclick="openPermit('${p.permit_id}')">ดู</button>`);
  if (a.qr) buttons.push(`<button class="btn-sm btn-qr" onclick="openQr('${p.permit_id}')">QR</button>`);
  if (a.dept) buttons.push(`<button class="btn-sm btn-dept" onclick="openInspector('${p.permit_id}','dept')">🏢 แผนก</button>`);
  if (a.inspector) buttons.push(`<button class="btn-sm btn-inspector" onclick="openInspector('${p.permit_id}','inspector')">🔍 จป.</button>`);
  if (a.checklist) buttons.push(`<button class="btn-sm btn-checklist" onclick="openChecklist('${p.permit_id}')">📋 Checklist</button>`);
  if (a.chairman) buttons.push(`<button class="btn-sm btn-chairman" onclick="openInspector('${p.permit_id}','chairman')">👑 คปอ.</button>`);
  if (a.overtime) buttons.push(`<button class="btn-sm btn-qr" onclick="openOvertime('${p.permit_id}')">⏰ OT</button>`);
  if (a.print) buttons.push(`<button class="btn-sm btn-print" onclick="openPrint('${p.permit_id}')">🖨️ พิมพ์</button>`);
  if (a.close) buttons.push(`<button class="btn-sm btn-close" onclick="closeWork('${p.permit_id}')">🔒 ปิดงาน</button>`);
  return buttons.join('');
}

function renderDesktop(permits) {
  const box = document.getElementById('tableContainer');
  if (!permits.length) {
    box.innerHTML = `<div class="empty-state">📭 ไม่พบใบอนุญาตในมุมมองนี้</div>`;
    return;
  }
  box.innerHTML = `<table class="permits-table"><thead><tr><th>Permit ID</th><th>บริษัท</th><th>วัน/เวลา</th><th>พื้นที่</th><th>ประเภทงาน</th><th>สถานะ</th><th>จัดการ</th></tr></thead><tbody>${permits.map(p => `
      <tr>
        <td><div class="permit-id">${p.permit_id}</div><div class="subtext">${p.submitted_at || '-'}</div></td>
        <td><div class="company-name">${p.company_name || '-'}</div><div class="subtext">หัวหน้า: ${p.supervisor || '-'}</div></td>
        <td>${APET.formatDate(p.work_date)}<div class="subtext">${p.time_start || '-'} - ${p.time_end || '-'}</div></td>
        <td><div class="work-area" title="${p.work_area || ''}">${p.work_area || '-'}</div></td>
        <td><div class="hazard-tags">${hazardTags(p.hazard_types) || '-'}</div></td>
        <td><span class="badge" style="${badgeClass(p.status)}">${p.status}</span></td>
        <td><div class="action-btns">${renderActions(p)}</div></td>
      </tr>`).join('')}</tbody></table>`;
}

function renderMobile(permits) {
  const box = document.getElementById('mobileContainer');
  if (!permits.length) {
    box.innerHTML = `<div class="empty-state">📭 ไม่พบใบอนุญาตในมุมมองนี้</div>`;
    return;
  }
  box.innerHTML = permits.map(p => `
    <div class="permit-card">
      <div class="permit-top">
        <div>
          <div class="permit-id">${p.permit_id}</div>
          <div class="company-name" style="margin-top:4px">${p.company_name || '-'}</div>
          <div class="subtext">หัวหน้า: ${p.supervisor || '-'}</div>
        </div>
        <span class="badge" style="${badgeClass(p.status)}">${p.status}</span>
      </div>
      <div class="permit-grid">
        <div><div class="label">วันทำงาน</div><div class="value">${APET.formatDate(p.work_date)}</div></div>
        <div><div class="label">เวลา</div><div class="value">${p.time_start || '-'} - ${p.time_end || '-'}</div></div>
        <div><div class="label">พื้นที่</div><div class="value">${p.work_area || '-'}</div></div>
        <div><div class="label">คนงาน</div><div class="value">${p.worker_count || 0} คน</div></div>
      </div>
      <div class="hazard-tags" style="margin-bottom:10px">${hazardTags(p.hazard_types) || ''}</div>
      <div class="action-btns">${renderActions(p)}</div>
    </div>`).join('');
}

function openPermit(id) { window.open(APET.buildPermitLink(id), '_blank'); }
function openQr(id) { window.open(APET.buildQrPosterLink(id), '_blank'); }
function openInspector(id, role) { window.open(APET.buildPageUrl('inspector.html', { id, role }), '_blank'); }
function openChecklist(id) { window.open(APET.buildPageUrl('checklist.html', { id }), '_blank'); }
function openPrint(id) { window.open(APET.buildPageUrl('print.html', { id }), '_blank'); }
function openOvertime(id) { window.open(APET.buildPageUrl('overtime.html', { id }), '_blank'); }

async function closeWork(id) {
  if (!confirm(`ยืนยันปิดงาน ${id} ?`)) return;
  try { await APET.closePermit(id); } catch (e) { console.warn(e); }
  APET.showToast(`🔒 ปิดงาน ${id} เรียบร้อย`, 'success');
  loadData();
}
</script>
</body>
</html>
