<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Permit Detail — APET</title>
<link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--red:#C0392B;--green:#27AE60;--orange:#E67E22;--blue:#2980B9;--purple:#7C5CBF;--gray-50:#F8F9FA;--gray-100:#F1F3F4;--gray-200:#E8EAED;--gray-300:#DADCE0;--gray-500:#9AA0A6;--gray-700:#5F6368;--gray-900:#202124}
*{box-sizing:border-box;margin:0;padding:0}body{font-family:'Sarabun',sans-serif;background:#F0F2F5;color:var(--gray-900)}
.header{background:#1A252F;position:sticky;top:0;z-index:10;box-shadow:0 2px 8px rgba(0,0,0,.12)}.header-inner{max-width:820px;margin:0 auto;padding:14px 16px;display:flex;gap:12px;align-items:center;flex-wrap:wrap}.logo{background:var(--red);color:#fff;padding:5px 10px;border-radius:8px;font-weight:700}.title{color:#fff;font-size:15px;font-weight:700}.sub{color:rgba(255,255,255,.7);font-size:12px}.back{margin-left:auto;color:#fff;text-decoration:none;background:rgba(255,255,255,.1);padding:8px 12px;border-radius:8px;font-size:13px}
.page{max-width:820px;margin:0 auto;padding:16px 14px 34px}.banner{background:#fff;border-radius:16px;padding:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px}.permit-id{font-family:monospace;font-size:18px;font-weight:700}.company{font-size:15px;font-weight:700;margin-top:4px}.meta{font-size:13px;color:var(--gray-700);margin-top:4px}.badge{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:999px;font-size:12px;font-weight:700;margin-top:10px}.approval-bar{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px}.approval-step{background:var(--gray-50);border:1px solid var(--gray-200);border-radius:12px;padding:12px;text-align:center}.approval-step.done{background:#D5F5E3;border-color:#B9E6C8}.role{font-size:12px;color:var(--gray-500);margin-top:6px}.name{font-size:12px;font-weight:700;margin-top:4px}
.section{background:#fff;border-radius:16px;box-shadow:0 2px 8px rgba(0,0,0,.06);margin-bottom:14px;overflow:hidden}.section-head{padding:14px 16px;border-bottom:1px solid var(--gray-200);font-size:14px;font-weight:700;background:var(--gray-50)}.section-body{padding:16px}.grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.item{background:var(--gray-50);border-radius:12px;padding:12px}.label{font-size:11px;color:var(--gray-500);text-transform:uppercase}.value{font-size:13px;font-weight:600;margin-top:4px;line-height:1.5}.tags{display:flex;flex-wrap:wrap;gap:8px}.tag{background:#FADBD8;color:var(--red);padding:5px 10px;border-radius:999px;font-size:12px;font-weight:700}.multiline{white-space:pre-line;line-height:1.7}.action-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}.btn{display:inline-flex;justify-content:center;align-items:center;gap:8px;border:none;border-radius:12px;padding:12px 14px;font:inherit;font-size:13px;font-weight:700;text-decoration:none;cursor:pointer}.btn.red{background:var(--red);color:#fff}.btn.blue{background:var(--blue);color:#fff}.btn.orange{background:var(--orange);color:#fff}.btn.green{background:var(--green);color:#fff}.btn.white{background:#fff;color:var(--gray-700);border:1.5px solid var(--gray-300)}.loading,.empty{text-align:center;padding:48px 16px;color:var(--gray-500)}
@media(max-width:640px){.grid,.action-grid,.approval-bar{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="header">
  <div class="header-inner">
    <div class="logo">APET</div>
    <div>
      <div class="title">รายละเอียด Permit</div>
      <div class="sub">เปิดจากลิงก์ตรงหรือสแกน QR ก็ได้</div>
    </div>
    <a href="dashboard.html" class="back">← Dashboard</a>
  </div>
</div>
<div class="page" id="app"><div class="loading">🔄 กำลังโหลด Permit...</div></div>
<script src="core.js"></script>
<script>
const permitId = APET.getParam('id');
const HAZARD_MAP = {construction:'🏗️ ก่อสร้าง', electrical:'⚡ ไฟฟ้า', pressure:'💨 ความดัน', machine:'⚙️ เครื่องจักร', aircon:'❄️ แอร์', hotwork:'🔥 งานร้อน', waterpipe:'🚰 ท่อน้ำ', fireprotect:'🧯 อัคคีภัย', confined:'🏠 ที่อับอากาศ', windsys:'💨 ระบบลม', hoist:'🏗️ รอก/เครน', highrisk:'📏 งานสูง', gas:'🛢️ ระบบก๊าซ', chemical:'☣️ สารเคมี', other:'📝 อื่นๆ'};
const app = document.getElementById('app');
if (!permitId) {
  app.innerHTML = '<div class="empty">ไม่พบเลข Permit ในลิงก์นี้</div>';
} else {
  loadPermit();
}
async function loadPermit() {
  try {
    const { permit, approval } = await APET.getPermit(permitId);
    render(permit, approval);
  } catch (e) {
    console.error(e);
    app.innerHTML = '<div class="empty">โหลดข้อมูลไม่สำเร็จ กรุณาตรวจสอบเลข Permit หรือสิทธิ์เข้าถึง</div>';
  }
}
function badgeStyle(status) {
  return {
    'อนุมัติ':'background:#D5F5E3;color:#1E8449',
    'ไม่อนุมัติ':'background:#FADBD8;color:#96281B',
    'รอแผนกที่ว่าจ้าง':'background:#FFF3CD;color:#856404',
    'รอ จป.วิชาชีพ':'background:#EAD7FF;color:#7C5CBF',
    'รอ ประธาน คปอ.':'background:#D6EAF8;color:#185FA5',
    'หมดอายุ':'background:#F2F3F4;color:#5F6368',
    'ปิดงาน':'background:#D5D8DC;color:#2C3E50'
  }[status] || 'background:#FFF3CD;color:#856404';
}
function render(permit, approval) {
  const status = APET.getEffectiveStatus(permit);
  const hazardTags = String(permit.hazard_types || '').split(',').map(s => s.trim()).filter(Boolean).map(h => `<span class="tag">${HAZARD_MAP[h] || h}</span>`).join('') || '<span class="value">-</span>';
  const workers = (permit.workers || '').trim() || '-';
  app.innerHTML = `
    <div class="banner">
      <div class="permit-id">${permit.permit_id}</div>
      <div class="company">${permit.company_name || '-'}</div>
      <div class="meta">หัวหน้างาน: ${permit.supervisor || '-'} · โทร: ${permit.phone || '-'}</div>
      <div class="badge" style="${badgeStyle(status)}">${status}</div>
      <div class="approval-bar">
        ${renderStep('🏢','แผนกที่ว่าจ้าง', approval.dept)}
        ${renderStep('🔍','จป.วิชาชีพ', approval.inspector)}
        ${renderStep('👑','ประธาน คปอ.', approval.chairman)}
      </div>
    </div>

    <div class="section">
      <div class="section-head">ข้อมูลงาน</div>
      <div class="section-body">
        <div class="grid">
          <div class="item"><div class="label">วันทำงาน</div><div class="value">${APET.formatDate(permit.work_date)}</div></div>
          <div class="item"><div class="label">เวลา</div><div class="value">${permit.time_start || '-'} - ${permit.time_end || '-'}</div></div>
          <div class="item"><div class="label">วันสิ้นสุด</div><div class="value">${APET.formatDate(permit.work_date_end || permit.work_date)}</div></div>
          <div class="item"><div class="label">จำนวนคน</div><div class="value">${permit.worker_count || 0} คน</div></div>
          <div class="item" style="grid-column:1/-1"><div class="label">พื้นที่ทำงาน</div><div class="value">${permit.work_area || '-'}</div></div>
          <div class="item" style="grid-column:1/-1"><div class="label">ลักษณะงาน</div><div class="value multiline">${permit.work_description || '-'}</div></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">ประเภทงาน / PPE / คนงาน</div>
      <div class="section-body">
        <div class="grid">
          <div class="item" style="grid-column:1/-1"><div class="label">ประเภทความเสี่ยง</div><div class="tags" style="margin-top:8px">${hazardTags}</div></div>
          <div class="item" style="grid-column:1/-1"><div class="label">PPE</div><div class="value multiline">${permit.ppe_required || '-'}${permit.ppe_other ? '\n' + permit.ppe_other : ''}</div></div>
          <div class="item" style="grid-column:1/-1"><div class="label">รายชื่อคนงาน</div><div class="value multiline">${workers}</div></div>
          <div class="item" style="grid-column:1/-1"><div class="label">ความเสี่ยง / มาตรการป้องกัน</div><div class="value multiline">${permit.risks || '-'}</div></div>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="section-head">เมนูด่วน</div>
      <div class="section-body">
        <div class="action-grid">
          <a class="btn blue" href="${APET.buildPageUrl('inspector.html', { id: permit.permit_id })}">✍️ ลงชื่ออนุมัติ</a>
          <a class="btn orange" href="${APET.buildPageUrl('checklist.html', { id: permit.permit_id })}">📋 Checklist</a>
          <a class="btn green" href="${APET.buildPageUrl('overtime.html', { id: permit.permit_id })}">⏰ ขอต่อเวลา</a>
          <a class="btn white" href="${APET.buildPageUrl('print.html', { id: permit.permit_id })}">🖨️ พิมพ์ใบงาน</a>
          <a class="btn red" href="${APET.buildPageUrl('qr-poster.html', { id: permit.permit_id })}">🔳 QR Permit</a>
          <button class="btn white" onclick="copyLink()">🔗 คัดลอกลิงก์</button>
        </div>
      </div>
    </div>`;
}
function renderStep(icon, label, data) {
  return `<div class="approval-step ${data ? 'done' : ''}"><div style="font-size:22px">${icon}</div><div class="role">${label}</div><div class="name">${data ? data.name : 'รอดำเนินการ'}</div></div>`;
}
async function copyLink() {
  try {
    await navigator.clipboard.writeText(window.location.href);
    APET.showToast('คัดลอกลิงก์แล้ว', 'success');
  } catch {
    APET.showToast('คัดลอกลิงก์ไม่สำเร็จ', 'error');
  }
}
</script>
</body>
</html>
